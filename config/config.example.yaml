# ============================================================
#  WDOS 完整配置文件
#  使用时复制为 config.yaml，修改实际值
#  敏感信息支持 ${ENV_VAR} 环境变量替换
# ============================================================

# ---------- 服务器 ----------
server:
  port: "9090"             # API 端口
  mode: "debug"            # debug=全放行CORS | release=生产模式
  cors_origins: "*"        # release模式CORS白名单, 逗号分隔, "*"=全放行

# ---------- 初始化 ----------
seed:
  admin_password: "Admin@123"  # 首次启动自动创建的管理员密码

# ---------- 回调签名 ----------
callback:
  secret: ""               # CRIP HMAC 签名密钥（空=不校验）

# ---------- MySQL ----------
database:
  host: "127.0.0.1"
  port: 3306
  name: "wdos_db"
  user: "root"
  password: "${DB_PASSWORD}"  # 支持环境变量

# ---------- Redis ----------
redis:
  addr: "127.0.0.1:6379"
  password: ""
  db: 0
  prefix: "wdos:"

# ---------- 图片存储（二选一，COS 优先）----------
cos:
  secret_id: ""
  secret_key: ""
  bucket: ""               # 格式: wdos-images-1234567890
  region: "ap-guangzhou"
  public_url: ""           # 格式: https://bucket.cos.region.myqcloud.com
                           # 留空则不启用COS，走MinIO

minio:
  endpoint: "127.0.0.1:9000"
  access_key: "minioadmin"
  secret_key: "minioadmin"
  bucket: "wdos"
  use_ssl: false

# ---------- JWT ----------
jwt:
  secret: "${JWT_SECRET}"  # 生产必须改！
  expire_seconds: 86400    # 24小时

# ---------- SLA 超时 ----------
sla:
  accept_l1_seconds: 30     # 接单L1(班长): 30秒
  accept_l2_seconds: 150    # 接单L2(经理): 150秒
  accept_l3_seconds: 300    # 接单L3(总监): 300秒
  process_l1_seconds: 60    # 处理L1: 60秒
  process_l2_seconds: 300   # 处理L2: 300秒
  process_l3_seconds: 600   # 处理L3: 600秒

# ---------- CRIP 对接 ----------
crip:
  callback_path: "/api/v1/callback/crip"
  openapi_base: ""          # CRIP OpenAPI 地址（补偿用）
  openapi_app_id: ""
  openapi_app_secret: ""
  heartbeat_interval: 300
  callback_secret: ""       # 回调HMAC签名密钥

# ---------- 微信 ----------
wechat:
  app_id: ""
  app_secret: ""
